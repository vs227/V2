services:
  - type: web
    name: ai-options-trader-backend
    runtime: python
    plan: starter
    rootDir: backend
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --ws none
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
      - key: KOTAK_CONSUMER_KEY
        sync: false
      - key: KOTAK_MOBILE_NUMBER
        sync: false
      - key: KOTAK_UCC
        sync: false
      - key: KOTAK_MPIN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: PAPER_TRADING
        value: "True"
      - key: LOG_LEVEL
        value: "INFO"
